name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Build
      run: go build ./...

    - name: Test
      run: go test -v ./...

    - name: Coverage
      run: go test -v -race -covermode=atomic -coverprofile=coverage.out

    # Optional: secret CODACY_PROJECT_TOKEN (secrets cannot be used in step "if:" — checked in shell).
    - name: Upload coverage to Codacy
      continue-on-error: true
      env:
        CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      run: |
        if [ -z "$CODACY_PROJECT_TOKEN" ]; then
          echo "CODACY_PROJECT_TOKEN not set; skipping Codacy upload."
          exit 0
        fi
        curl -Ls https://coverage.codacy.com/get.sh > codacy-coverage-reporter.sh
        chmod +x codacy-coverage-reporter.sh
        ./codacy-coverage-reporter.sh report --force-coverage-parser go -r coverage.out
