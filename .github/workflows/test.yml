name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Build
      run: go build ./...

    - name: Test
      run: go test -v ./...

    - name: Coverage
      run: go test -v -race -covermode=atomic -coverprofile=coverage.out

    # Optional: add repo at https://app.codacy.com, then set secret CODACY_PROJECT_TOKEN.
    # "Request URL not found" usually means wrong token or project not linked to this repository.
    - name: Upload coverage to Codacy
      if: ${{ secrets.CODACY_PROJECT_TOKEN != '' }}
      continue-on-error: true
      run: |
        curl -Ls https://coverage.codacy.com/get.sh > codacy-coverage-reporter.sh
        chmod +x codacy-coverage-reporter.sh
        ./codacy-coverage-reporter.sh report --force-coverage-parser go -r coverage.out
      env:
        CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
