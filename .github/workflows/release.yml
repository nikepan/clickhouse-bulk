name: goreleaser

on:
  push:
    tags:
      - '*.*.*'

# Required for GoReleaser to create/update GitHub Releases (avoids 403 "Resource not accessible by integration").
permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      # Required: secret DOCKERHUB_TOKEN
      # Optional: secret or variable DOCKERHUB_USERNAME (defaults to github.repository_owner, e.g. itcrow)
      - name: Resolve Docker Hub username
        id: dockerhub
        env:
          SECRET_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          VAR_USER: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$SECRET_USER" ]; then
            USER="$SECRET_USER"
          elif [ -n "$VAR_USER" ]; then
            USER="$VAR_USER"
          else
            USER="${{ github.repository_owner }}"
            echo "DOCKERHUB_USERNAME not set; using repository owner: $USER"
          fi
          echo "username=$USER" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub token
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing repository secret DOCKERHUB_TOKEN (Docker Hub access token)."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Prefer fine-grained/classic PAT (secret GH_PAT) if org limits default GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
